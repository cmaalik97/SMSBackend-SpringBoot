services:
  postgres:
    container_name: sms_postgres
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sms_db
    ports:
      - "5433:5432"
    volumes:
      - sms_pgdata:/var/lib/postgresql/data

  pgadmin:
    container_name: sms_pgadmin
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: smsadmin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5051:80"

volumes:
  sms_pgdata:
